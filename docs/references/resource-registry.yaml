    supplied_by: user
    kind: implementation_audit_target
    location:
      type: local_directory
      path: "C:/Users/Administrator/Documents/loopy-skill-handoff"
    key_artifacts:
      - path: "loopy/SKILL.md"
        sha256: "cee9b627b8b78d3712e144527681943e6b403a276b3c40260fca0a393cec7938"
      - path: "loopy/references/upgrade-skill.md"
        sha256: "f22c61bd3d642f28d0f337319d0f9c0828680e7f0c5dd489a2b2fd804f505683"
      - path: "docs/IMPLEMENTATION-HANDOFF.md"
        sha256: "497f1d484e9bf4f6e5673f7dd91885ad5a6a85113f991220c2ac6ca19ebaa5c5"
      - path: "docs/TESTING-HANDOFF.md"
        sha256: "fed0f903c7268daf95b076289879a1bf0f4846d80cb98fd4a7ad49203edd654c"
    authority: audit_target
    owns:
      - evidence of the current Phase 1 implementation
      - concrete upgrade workflow and current naming
      - handoff claims that require independent verification
    adopt:
      - Craft and guided-design behavior as the existing starting point for from-scratch Loop creation
      - Skill-to-Loop Upgrade and its Loopability Gate as the existing starting point for Skill optimization
      - only code or prose that passes the new specification and tests
    risks:
      - current directory is not a Git repository
      - test handoff contains summary counts but no rerunnable fixtures or raw outputs
      - current implementation differs from Phase 1 baseline terminology
      - Loop Library connections remain and must not enter Loopcraft Clean
    do_not_use:
      - wholesale copy into the new repository
      - final proof of correctness

  - id: workflow-skill-creator
    title: Workflow-to-Skill Distiller
    supplied_by: user
    kind: high_fidelity_localization_source
    location:
      type: local_directory
      path: "C:/Users/Administrator/Downloads/workflow_skill_creator"
    key_artifacts:
      - path: SKILL.md
        sha256: "4833b12e3bbe5298783a7ff5132951b494e661eecb034eb6f01973a8cccfaa18"
      - path: references/cli_script_template.py
        sha256: "8e85e845697fd44401c2d8ec471d61526465970206b60c37141757b289a8d4fe"
    upstream:
      repository: "https://github.com/google-deepmind/science-skills"
      revision: "33557e0f1faf0f281d255940de58935c61b2143b"
      license: Apache-2.0
    authority: localize
    owns:
      - conversation and completed-workflow recovery
      - iterative clarification after observing the workflow
      - strict-versus-flexible step analysis
      - dependency and resource discovery
      - design approval before implementation
    adopt:
      - observed workflow summary followed by progressive questions
      - explicit inputs, outputs, scope, error, dependency, and resource recovery
      - skill design approval gate
    localize:
      - replace Science Skills bundle assumptions
      - replace fixed uv and platform-path assumptions
      - replace any-I/O-means-CLI rule with capability-based design
      - make behavioral validation required in proportion to risk
      - emit Behavior Contract before the common Loopability Gate
    risks:
      - issue: local extracted directory does not include the upstream LICENSE file
        current_severity: non_blocking_for_private_learning_and_reference
        deferred_gate: required before vendoring, redistribution, publication, or shipping copied/modified material
      - issue: copied or modified material must retain Apache-2.0 and modification notices when distributed
        current_severity: recorded_not_blocking
    do_not_use:
      - from-scratch Loop creation
      - test fixture or benchmark question
      - separate Workflow-to-Loop implementation that duplicates the common gate

  - id: skill-polisher
    title: Skill Polisher
    supplied_by: user
    kind: existing_skill_lifecycle_tool
    upstream:
      repository: "https://github.com/Conradgui/skill-polisher"
      revision: "63df4b508acbbbe4d351d30f1c7d0701c8fc75f7"
      license: MIT
    authority: adopt
    owns:
      - existing Skill review, polish, and recheck
      - proportional evidence boundary
      - living-contract reconstruction
      - learned-invariant versus sediment analysis
      - release-drift audit
    adopt:
      - Review, Polish, and Recheck mode separation
      - read-only review by default
      - contract, system, evolution, and evidence evaluation axes
      - smallest evidence-backed change and stable finding IDs
      - source, repository, publication, CI, and installation state separation
    localize:
      - emit a normalized Behavior Contract and preserved-invariant ledger for Loopcraft
      - hand full rebuilds to Skill Creator Pro
    do_not_use:
      - create a new Skill identity
      - define Loop IR or Compiler behavior
      - replace the common Loopability Gate

  - id: skill-creator-pro
    title: Skill Creator Pro
    supplied_by: user
    kind: new_skill_lifecycle_tool
    upstream:
      repository: "https://github.com/Conradgui/skill-creator-pro"
      revision: "eb23656e56ea3555599a6c5278a8b5834dc56b6d"
      license: Apache-2.0
      ci_evidence: "https://github.com/Conradgui/skill-creator-pro/actions/runs/29337650517"
    authority: adopt
    owns:
      - new Skill and deliberate rebuild behavior contract
      - invocation and information hierarchy
      - observable Done-when gates
      - Skill scaffolding, structural validation, quality lint, and forward testing
      - first packaging and release engineering
    adopt:
      - behavior-contract-first creation
      - trigger branches and near misses
      - one owner per behavior, artifact, adapter, and route
      - conditional references and deterministic scripts
      - quality_lint and risk-scaled fresh-context forward tests
      - runtime artifact versus human documentation separation
    localize:
      - use only in Skill-facing entry and Adapter modules
      - translate Codex-specific metadata through the Codex Skill Adapter
      - omit release branches from the default build unless publication is requested
    risks:
      - intentionally does not own existing Skill in-place review
      - more complex than the official baseline and must be applied proportionally
      - current repository regression suite is focused rather than exhaustive
    do_not_use:
      - Kernel semantic authority
      - Workflow extraction from completed conversations
      - universal cross-platform metadata schema

  - id: skill-writing-guidelines
    title: Matt Pocock Inspired Skill Writing Guidelines
    supplied_by: user
    kind: cross_cutting_writing_reference
    upstream:
      repository: "https://github.com/Conradgui/matt-pocock-inspired-skill-writing"
      revision: "86704943ddac32129ff8b5a411c5b9bcb195428a"
      source_study_revision: "mattpocock/skills@66898f60e8c744e269f8ce06c2b2b99ce7660d5f"
      license: MIT
    authority: reference
    owns:
      - process-predictability writing principles
      - primitive-versus-orchestrator vocabulary
      - description-as-branch-index guidance
      - observable gates, proportional rigor, progressive disclosure, and pruning guidance
      - repository engineering reference
    adopt:
      - twelve writing principles as review heuristics
      - one source of truth and purpose-built durable artifacts
      - fail-fast gates and independent judgment axes
      - runtime truth versus human documentation separation
    localize:
      - translate every harness-specific field through an Adapter
      - apply mechanisms in proportion to Loopcraft module risk
    do_not_use:
      - generator or Compiler implementation
      - claim that the twelve-part model is Matt Pocock's official framework
      - proof of behavior without Loopcraft-specific tests

  - id: official-codex-skill-creator
    title: OpenAI Codex Skill Creator
    supplied_by: platform
    kind: compatibility_baseline
    location:
      type: installed_file
      path: "C:/Users/Administrator/.codex/skills/.system/skill-creator/SKILL.md"
      sha256: "2940e08d49e5197453e58a4387d14cb07101b97911c992ef75c8289e0a1734c0"
    authority: boundary_only
    owns:
      - current Codex Skill folder and metadata compatibility baseline
      - platform-native validation expectations
    adopt:
      - no primary workflow; Skill Creator Pro is the preferred creation source
    do_not_use:
      - primary Loopcraft Skill creation workflow
      - reason to weaken Skill Creator Pro behavior and evidence gates

edition_boundaries:
  loopcraft_clean:
    allowed:
      - localized authoring mechanisms
      - Behavior Contract, Loop IR, Compiler, Validator, Evidence Packager
      - Skill, compact Prompt, runtime, presentation, and future-standard Adapters
    forbidden:
      - Loopy runtime dependency
      - Loop Library catalog, lookup, publish, or registry dependency
  loopcraft_library_edition:
    base: loopcraft_clean
    adds:
      - Loop Library Catalog Adapter
      - catalog discovery, version resolution, and publication integration
    rule: Library Edition adapters depend on Kernel contracts; Kernel never depends on the library.
