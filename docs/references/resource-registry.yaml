schema_version: "0.1.0"
as_of: "2026-07-20"
project: loopcraft
purpose: >-
  Register the exact source, authority, reusable mechanisms, localization
  boundary, and prohibited uses of materials used to design Loopcraft.

authority_order:
  - rank: 1
    source: approved_loopcraft_spec_and_adrs
    rule: Approved Loopcraft decisions override every external reference.
  - rank: 2
    source: active_implementation_plan
    rule: The active plan controls sequencing but cannot override the spec.
  - rank: 3
    source: verified_execution_records
    rule: Reproducible tests, traces, receipts, and diffs bound completion claims.
  - rank: 4
    source: this_resource_registry
    rule: References guide design only within their registered ownership boundary.
  - rank: 5
    source: handoff_claims_and_conversation_history
    rule: Treat claims as leads until checked against source artifacts or evidence.

reuse_modes:
  adopt: Reuse the mechanism as a preferred design pattern.
  localize: Preserve the proven logic but replace source-specific assumptions.
  reference: Use for rationale, comparison, or terminology; do not copy as authority.
  audit_target: Inspect as an implementation artifact; do not assume completion.
  boundary_only: Use to define an edition boundary or prohibited dependency.

entry_starting_points:
  from_scratch_loop:
    status: existing_candidate
    source: phase1-handoff-package
    evidence:
      - "loopy/SKILL.md: Craft / Guided Design"
      - "loopy/SKILL.md: Craft a loop through an interview"
    work_mode: audit, detach Library coupling, rename, migrate, and harden against the approved spec
    rule: Existing behavior reduces implementation work but does not prove Phase 2 conformance.
  existing_skill_to_loop:
    status: existing_candidate
    source: phase1-handoff-package
    evidence:
      - "loopy/SKILL.md: Skill-to-Loop Upgrade route"
      - "loopy/references/upgrade-skill.md: Loopability Gate and four verdicts"
    work_mode: independently verify, migrate terminology, integrate Behavior Contract, and harden
    rule: Do not rebuild from zero and do not accept handoff completion claims without rerunnable evidence.
  conversation_to_workflow_to_loop_skill:
    status: new_integration
    source: workflow-skill-creator
    work_mode: high-fidelity localization followed by the shared Loopability and Skill production pipeline
    rule: Workflow extraction is new; Loop analysis and Skill generation must reuse common modules.

resources:
  - id: loop-engineering-dialogue
    title: Loop Engineering and Writing Guide
    supplied_by: user
    kind: research_and_decision_history
    location:
      type: local_file
      path: "C:/Users/Administrator/Downloads/Loop工程与写作指导.md"
      sha256: "a6d2abd1652ed84f32f8af3fa6278dcef0ab1b93c17bf36735398c2c74734d84"
    authority: reference
    license: user-provided conversation record; embedded external sources retain their own terms
    owns:
      - historical rationale
      - candidate terminology
      - external-reading leads
      - rejected and superseded alternatives
    adopt:
      - verifier-centered Loop framing
      - dual Semantic IR and Execution IR distinction
      - adapter categories and audit concerns
      - maturity, risk, evidence, and governance question inventory
    do_not_use:
      - final schema authority
      - executable instructions
      - proof that cited external claims are current

  - id: phase1-baseline-v1
    title: Loopy Skill-to-Loop Upgrade PR Baseline
    supplied_by: user
    kind: historical_baseline
    location:
      type: local_file
      path: "C:/Users/Administrator/Downloads/01_loopy_skill_to_loop_pr_baseline.md"
      sha256: "cb19f2c1eff11c5872236965565c180d2330186076e6aff779ac156032ef693a"
    authority: reference
    owns:
      - original Phase 1 intent
      - initial Skill Contract extraction
      - Loopability Gate criteria
      - initial output classification and acceptance surface
    adopt:
      - feedback-driven versus one-shot gate
      - preserve complete Skill output
      - embedded and multiple-Loop analysis
      - positive, negative, and boundary test categories
    superseded:
      - "standalone_loop is replaced by loop_first_skill in the current design"
      - "Skill Contract is not the universal Kernel contract; use Behavior Contract"
    do_not_use:
      - independent proof that Phase 1 is complete
      - final Phase 2 architecture

  - id: phase2-baseline-v1
    title: Loop IR Architecture Baseline
    supplied_by: user
    kind: architecture_baseline
    location:
      type: local_file
      path: "C:/Users/Administrator/Downloads/02_loop_ir_architecture_baseline.md"
      sha256: "ebfb34bdd275948f45a3c6304d99a0d7f3a5c0b06249081353af0484f8065015"
    authority: reference
    owns:
      - Phase 2 problem inventory
      - dual-IR seed architecture
      - extension, adapter, version, source-map, receipt, importer, and conformance candidates
    adopt:
      - Semantic IR as semantic authority
      - Execution IR as derived plan
      - Core, standard extension, and vendor binding separation
      - deterministic build, Source Map, Import Report, and conformance goals
    superseded:
      - "approval_required is a suspended reason, not a terminal status"
      - "cancelled is an execution status; superseded is a cancellation reason"
      - "policy denial is an authorization decision, not a runtime error"
      - "Execution Override uses typed allow-listed operations"
      - "v0.1 rejects recursive subloops and parallel child runs"
      - "Behavior Contract replaces universal Skill Contract"
    do_not_use:
      - final schema without the approved Phase 2 spec
      - runtime dependency on Loopy or Loop Library

  - id: loopy-original-readme-extract
    title: Original Loopy README Extract
    supplied_by: user
    kind: upstream_behavior_history
    location:
      type: local_file
      path: "C:/Users/Administrator/Downloads/loopy_skill_extracted_from_readme.md"
      sha256: "c0ddb5e6ceb9507d5116e07cd58f9bcbf20959115427256c561c17596c013441"
    upstream:
      repository: "https://github.com/Forward-Future/loopy"
      revision: "75966cbd572a4185064971c9fe5e9c52e8f8456d"
      license: MIT
    authority: reference
    owns:
      - original Loopy product behavior and vocabulary
      - find, discover, adapt, craft, run, debrief, save, and publish history
      - compact Prompt precedent
      - original Loopy and Loop Library relationship
    adopt:
      - goal-to-bounded-loop interview logic for the from-scratch entry
      - audit, run, receipt, and debrief concepts where independently validated
      - compact Prompt as an Adapter projection route
    do_not_use:
      - Loopy names or runtime dependencies in Loopcraft Clean
      - Loop Library lookup, save, publish, or catalog behavior in Kernel
      - compact Prompt as the canonical Loop definition

  - id: phase1-handoff-package
